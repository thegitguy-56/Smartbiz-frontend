name: SmartBiz E2E Tests

# Trigger on every push to any branch
on:
  push:
    branches: ["*"]
  workflow_dispatch:  # Allow manual trigger

jobs:
  e2e-test:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup Python
      # ------------------------------------------------------------------
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tests/requirements.txt

      # ------------------------------------------------------------------
      # 3. Install Google Chrome (stable)
      # ------------------------------------------------------------------
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ------------------------------------------------------------------
      # 4. Install Python dependencies
      # ------------------------------------------------------------------
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      # ------------------------------------------------------------------
      # 5. Run Selenium E2E Tests
      # ------------------------------------------------------------------
      - name: Run E2E Tests
        working-directory: tests/e2e
        env:
          SMARTBIZ_BASE_URL: "https://thegitguy-56.github.io/Smartbiz-frontend/"
          SMARTBIZ_API_URL: "https://smartbiz-backend-c7ru.onrender.com/api"
        run: |
          pytest . -v \
            --tb=short \
            --junitxml=../results.xml \
            --timeout=120 \
            -x --maxfail=50 \
            || true
        # '|| true' ensures workflow continues even if tests fail
        # so we can still generate and upload the report

      # ------------------------------------------------------------------
      # 6. Generate XLSX Report
      # ------------------------------------------------------------------
      - name: Generate XLSX Test Report
        if: always()
        working-directory: tests
        run: |
          python generate_report.py results.xml execution_log.jsonl

      # ------------------------------------------------------------------
      # 7. Upload XLSX Report as Artifact
      # ------------------------------------------------------------------
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBiz-E2E-Test-Report
          path: tests/E2E_Test_Report_SmartBiz_*.xlsx
          retention-days: 30
          if-no-files-found: warn

      # ------------------------------------------------------------------
      # 8. Upload Screenshots (if any tests failed)
      # ------------------------------------------------------------------
      - name: Upload Failure Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBiz-E2E-Screenshots
          path: tests/screenshots/
          retention-days: 14
          if-no-files-found: ignore

      # ------------------------------------------------------------------
      # 9. Print Test Summary
      # ------------------------------------------------------------------
      - name: Print Test Summary
        if: always()
        working-directory: tests
        run: |
          echo "============================================"
          echo "  SmartBiz E2E Test Results Summary"
          echo "============================================"
          if [ -f results.xml ]; then
            TOTAL=$(grep -o 'tests="[0-9]*"' results.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' results.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' results.xml | head -1 | grep -o '[0-9]*')
            echo "  Total Tests:  ${TOTAL:-0}"
            echo "  Failures:     ${FAILURES:-0}"
            echo "  Errors:       ${ERRORS:-0}"
          else
            echo "  No results.xml found"
          fi
          echo ""
          echo "  Report: Download from Artifacts tab above"
          echo "============================================"
